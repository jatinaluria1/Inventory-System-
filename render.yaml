services:
  # PostgreSQL Database
  - type: db
    name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free

  # Backend Web Service
  - type: web
    name: inventory-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
